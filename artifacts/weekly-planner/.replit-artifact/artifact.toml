kind = "web"
previewPath = "/"
title = "Weekly Planner & Daily Task Tracker"
version = "1.0.0"
id = "artifacts/weekly-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19742

[services.development]
run = "pnpm --filter @workspace/weekly-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/weekly-planner", "run", "build" ]
publicDir = "artifacts/weekly-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19742"
BASE_PATH = "/"
